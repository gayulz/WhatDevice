<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <link rel="canonical" href="{{CANONICAL}}">

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="WhatDevice">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:url" content="{{CANONICAL}}">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary">

  <link rel="icon" href="{{BASE}}favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="{{BASE}}style.css">

  <!-- Google Search Console 소유권 확인 메타. -->
  <meta name="google-site-verification" content="Lj9WIn4tyx-Fwr1HPd0amByYMKOR6DjXiv5mlrODgx4">

  <!-- [placeholder] Google Analytics(GA4). 측정 ID(G-XXXXXXXXXX)로 교체 후 주석 해제.
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script> -->

  <!-- 카카오 애드핏 SDK (페이지당 1회 로드, 모든 .kakao_ad_area 자동 스캔) -->
  <script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>

  <!-- 다크모드 깜빡임 방지: 렌더 전에 테마 클래스를 미리 적용 -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (!t && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) { /* localStorage 사용 불가 환경 무시 */ }
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{{BASE}}index.html">What<span>Device</span></a>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="다크/라이트 모드 전환">
        <span class="theme-icon" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <main class="container">
{{MAIN}}
  </main>

  <footer class="site-footer">
    <div class="container">
      <nav class="footer-nav" aria-label="사이트 정책">
        <a href="{{BASE}}guide/identifier-basics.html">가이드</a>
        <a href="{{BASE}}policy/terms.html">이용약관</a>
        <a href="{{BASE}}policy/privacy.html">개인정보처리방침</a>
        <a href="{{BASE}}policy/contact.html">문의</a>
      </nav>
      <p class="disclaimer">{{DISCLAIMER}}</p>
    </div>
  </footer>

  <script src="{{BASE}}theme.js"></script>
{{SCRIPTS}}
</body>
</html>
