# GitHub Pages 자동 배포 워크플로
# main 브랜치 push 시 BuildSite를 실행하여 dist/를 생성하고 Pages에 배포한다.
# 데이터 자동 동기화(clo4 원본 재다운로드)가 필요하면 fetch 단계의 주석을 해제하면 된다.

name: Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  # 데이터 주기 동기화 예시 (매주 월요일 03:00 UTC)
  # schedule:
  #   - cron: '0 3 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # (선택) clo4 원본을 최신으로 동기화하려면 주석 해제
      # - name: Sync devices.json (optional)
      #   run: curl -sSL https://raw.githubusercontent.com/clo4/apple_device_identifiers/main/devices.json -o data/devices.json

      - name: Build site
        run: |
          gradle wrapper --gradle-version 8.10.2
          ./gradlew run --no-daemon

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
